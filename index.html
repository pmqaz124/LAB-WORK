<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .todo-container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #343a40;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #4dabf7;
        }
        button.add-btn {
            padding: 12px 20px;
            background-color: #4dabf7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }
        button.add-btn:hover {
            background-color: #3bc9db;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        li:hover {
            background: #f1f3f5;
        }
        .task-text {
            flex: 1;
            cursor: pointer;
            font-size: 16px;
            color: #495057;
            word-break: break-word;
        }
        .completed .task-text {
            text-decoration: line-through;
            color: #adb5bd;
        }
        button.delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }
        button.delete-btn:hover {
            background: #fa5252;
        }
        .empty-state {
            text-align: center;
            color: #868e96;
            font-style: italic;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h1>My To-Do List</h1>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task..." onkeypress="handleKeyPress(event)">
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>

        <ul id="taskList">
            </ul>
        <div id="emptyState" class="empty-state">No tasks yet. Add one above!</div>
    </div>

    <script>
        // Load tasks from LocalStorage or start with an empty array
        let tasks = JSON.parse(localStorage.getItem('todo_tasks')) || [];

        function saveTasks() {
            localStorage.setItem('todo_tasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            const emptyState = document.getElementById('emptyState');
            
            taskList.innerHTML = ''; // Clear current list

            if (tasks.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                
                tasks.forEach((task, index) => {
                    const li = document.createElement('li');
                    if (task.completed) {
                        li.classList.add('completed');
                    }

                    li.innerHTML = `
                        <span class="task-text" onclick="toggleTask(${index})">${task.text}</span>
                        <button class="delete-btn" onclick="deleteTask(${index})">Delete</button>
                    `;
                    taskList.appendChild(li);
                });
            }
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            
            if (text !== '') {
                tasks.push({ text: text, completed: false });
                input.value = '';
                saveTasks();
                renderTasks();
            }
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addTask();
            }
        }

        // Initial render
        renderTasks();
    </script>
</body>
</html>
